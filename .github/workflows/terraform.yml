name: Validate Terraform

on:
  pull_request:
    paths:
      - "deploy-studio.json"
      - "infra/terraform/**"
      - "tests/test_deploy_studio_contract.py"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "deploy-studio.json"
      - "infra/terraform/**"
      - "tests/test_deploy_studio_contract.py"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Validate Deploy Studio contract
        run: python -m unittest discover -s tests -p 'test_deploy_studio_contract.py' -v

      - name: Prepare synthetic credential placeholders
        shell: bash
        run: |
          mkdir -p infra/terraform/.oci
          cp infra/terraform/config.example infra/terraform/.oci/config
          printf '%s\n' 'synthetic-ci-placeholder' > infra/terraform/.oci/key.pem

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/terraform

      - name: Initialize Terraform
        run: terraform -chdir=infra/terraform init -backend=false -input=false

      - name: Validate Terraform
        run: terraform -chdir=infra/terraform validate

  release:
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists."
            exit 0
          fi

          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
